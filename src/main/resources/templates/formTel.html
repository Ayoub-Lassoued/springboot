<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Ajout des Telephones</title>
    <link rel="stylesheet" href="/webjars/bootstrap/4.3.1/css/bootstrap.min.css"/>
    <script src="/webjars/jquery/3.5.1/jquery.min.js"></script>
    <script src="/webjars/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</head>
<body>
<div th:replace="~{template}"></div>
<div class="container mt-5">
    <div class="card">
        <div class="card-header" th:if="${mode=='new'}">Ajout des Telephones</div>
        <div class="card-header" th:if="${mode=='edit'}">Modification des Telephones</div>
        <div class="card-body">
            <form th:action="@{/saveTel}" th:object="${telephone}" method="post">
                <!-- Hidden fields -->
                <input type="hidden" name="idtel" th:value="*{idtel}" th:if="${telephone.idtel != null}"/>
                <input type="hidden" name="idtel" value="" th:if="${telephone.idtel == null}"/>
                <input name="page" type="hidden" th:value="${page}"/>
                <input name="size" type="hidden" th:value="${size}"/>


                <div class="form-group">
                    <label>Nom telephone :</label>
                    <input type="text" th:field="*{nomTel}" class="form-control" placeholder="Entrez le nom" required/>
                    <span th:if="${#fields.hasErrors('nomTel')}" th:errors="*{nomTel}" class="text-danger"></span>
                </div>


                <div class="form-group">
                    <label>Prix telephone :</label>
                    <input type="number" th:field="*{prixTel}" class="form-control" step="0.01" placeholder="Entrez le prix" required/>
                    <span th:if="${#fields.hasErrors('prixTel')}" th:errors="*{prixTel}" class="text-danger"></span>
                </div>

                <!-- Date création -->
                <div class="form-group">
                    <label>Date création :</label>
                    <input type="date" th:field="*{dateCreation}" class="form-control" required/>
                    <span th:if="${#fields.hasErrors('dateCreation')}" th:errors="*{dateCreation}" class="text-danger"></span>
                </div>

                <!-- Statut -->
                <div class="form-group">
                    <label>Statut :</label>
                    <select name="statutId" class="form-control">
                        <option th:each="stat : ${statuts}"
                                th:value="${stat.idSat}"
                                th:text="${stat.nomSat}"
                                th:selected="${telephone.statut != null && stat.idSat == telephone.statut.idSat}">
                        </option>
                    </select>
                </div>

                <!-- Submit button -->
                <div>
                    <button type="submit" class="btn btn-primary">
                        <span th:if="${mode=='new'}">Ajouter</span>
                        <span th:if="${mode=='edit'}">Modifier</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
