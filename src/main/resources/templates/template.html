<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="utf-8">
    <title>Gestion des Telephones</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/4.3.1/css/bootstrap.min.css}" />
    <script th:src="@{/webjars/jquery/3.5.1/jquery.min.js}"></script>
    <script th:src="@{/webjars/popper.js/1.14.7/umd/popper.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/4.3.1/js/bootstrap.min.js}"></script>
</head>
<body>
<nav class="navbar navbar-expand-sm bg-dark navbar-dark" th:fragment="template">

    <a class="navbar-brand" th:href="@{/listeTelephones}">Gestion Telephones</a>

    <ul class="navbar-nav">
        <li class="nav-item">
            <a class="nav-link" th:href="@{/listeTelephones}">Home</a>
        </li>
        <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#"
               id="navbarTelDrop" data-toggle="dropdown">
                Telephones
            </a>
            <div class="dropdown-menu">
                <a sec:authorize="hasAnyAuthority('ADMIN','AGENT')"
                   class="dropdown-item"
                   th:href="@{/showCreateTel}">Ajouter</a>
                <a class="dropdown-item"
                   th:href="@{/listeTelephones}">Lister</a>
            </div>
        </li>
    </ul>

    <ul class="navbar-nav ml-auto">
        <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#"
               id="navbardrop" data-toggle="dropdown">
                <span sec:authentication="name"></span>
            </a>
            <div class="dropdown-menu">
                <a sec:authorize="!isAuthenticated()"
                   class="dropdown-item"
                   th:href="@{/login}">Login</a>
                <a sec:authorize="isAuthenticated()"
                   class="dropdown-item"
                   th:href="@{/logout}">Logout</a>
                <a class="dropdown-item" href="#">Profile</a>
            </div>
        </li>
    </ul>

</nav>
</body>
</html>
